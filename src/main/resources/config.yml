# ============================================================
# Duels Plugin - Main Configuration
# ============================================================

# BungeeCord target server name for /lobby
lobby:
  server: "lobby"

# Hub spawns on THIS server. /hub <n> teleports to the nth entry (1-based).
hubs:
  - world: "lobby"
    x: 0.5
    y: 64.0
    z: 0.5
    yaw: 0.0
    pitch: 0.0

# ============================================================
# Arena Settings
# ============================================================
arenas:
  # Global default spawn-point offsets (relative to the world origin).
  # Used by any arena that does NOT define its own spawn-points section.
  # Add multiple entries under team-a / team-b for random selection each round.
  # At least one entry per team is required.
  spawn-points:
    team-a:
      - x: 0.5
        y: 64.0
        z: -10.0
        yaw: 0.0
        pitch: 0.0
    team-b:
      - x: 0.5
        y: 64.0
        z: 10.0
        yaw: 180.0
        pitch: 0.0
  # Directory for ASWM file-loader storage (relative to server root)
  slime-directory: "slime_worlds"

# List of arenas (each maps to a template in the ASWM world)
arena-list:
  example_arena:
    display-name: "<gradient:#ff6b6b:#ffa500>Example Arena</gradient>"
    # If true, this arena is available for matchmaking
    enabled: true
    # Per-arena spawn-point offsets (relative to world origin).
    # Overrides the global arenas.spawn-points when present.
    # Remove this section to fall back to the global defaults.
    # You can list multiple offsets per team — one is chosen randomly each round.
    spawn-points:
      team-a:
        - x: 0.5
          y: 64.0
          z: -10.0
          yaw: 0.0
          pitch: 0.0
      team-b:
        - x: 0.5
          y: 64.0
          z: 10.0
          yaw: 180.0
          pitch: 0.0
    # 2D polygon boundary for this arena (relative to world origin).
    # Points are "x,z" pairs. minY/maxY define the vertical bounds.
    # If omitted, no polygon boundary checking is applied.
    polygon:
      min-y: -64
      max-y: 319
      points:
        - "18,75"
        - "18,25"

# ============================================================
# Lobby Hotbar Items
# ============================================================
# These items are given to players when they return to the lobby.
# They are locked in place (cannot be moved/dropped).
# Use them as triggers for DeluxeMenus or other menu plugins.
lobby-items:
  0:
    material: DIAMOND_SWORD
    name: "<green><bold>Queue for Duel"
    lore:
      - "<gray>Click to join the duel queue"
    # Custom model data for resource pack support (optional)
    custom-model-data: 0
    # Commands to execute when item is right-clicked.
    # Types: player (run as player), console (run from console), message (send MiniMessage), bungee (transfer server)
    # Use {player} placeholder in console commands for player name.
    execute-on-use:
      - type: player
        command: "dm open queue_menu"
    # Bukkit ItemFlags to apply (e.g. HIDE_ATTRIBUTES, HIDE_ENCHANTS, HIDE_UNBREAKABLE)
    item-flags:
      - HIDE_ATTRIBUTES
      - HIDE_UNBREAKABLE
      - HIDE_ENCHANTS
  1:
    material: BOOK
    name: "<yellow><bold>Leaderboards"
    lore:
      - "<gray>View top players"
    custom-model-data: 0
    execute-on-use:
      - type: player
        command: "dm open leaderboard_menu"
    item-flags:
      - HIDE_ATTRIBUTES
      - HIDE_UNBREAKABLE
      - HIDE_ENCHANTS
  2:
    material: EMERALD
    name: "<light_purple><bold>Cosmetics"
    lore:
      - "<gray>Coming soon!"
    custom-model-data: 0
    execute-on-use:
      - type: message
        command: "<gray>Cosmetics coming soon!"
    item-flags:
      - HIDE_ATTRIBUTES
      - HIDE_UNBREAKABLE
      - HIDE_ENCHANTS
  4:
    material: COMPASS
    name: "<aqua><bold>Choose Hub"
    lore:
      - "<gray>Switch to another hub server"
    custom-model-data: 0
    execute-on-use:
      - type: player
        command: "dm open hub_menu"
    item-flags:
      - HIDE_ATTRIBUTES
      - HIDE_UNBREAKABLE
      - HIDE_ENCHANTS
  6:
    material: REDSTONE
    name: "<gold><bold>Settings"
    lore:
      - "<gray>Customize your experience"
    custom-model-data: 0
    execute-on-use:
      - type: message
        command: "<gray>Settings coming soon!"
    item-flags:
      - HIDE_ATTRIBUTES
      - HIDE_UNBREAKABLE
      - HIDE_ENCHANTS
  8:
    material: RED_BED
    name: "<red><bold>Quit to Lobby"
    lore:
      - "<gray>Return to the main lobby"
    custom-model-data: 0
    execute-on-use:
      - type: bungee
        command: "lobby"
    item-flags:
      - HIDE_ATTRIBUTES
      - HIDE_UNBREAKABLE
      - HIDE_ENCHANTS

# ============================================================
# Duel Settings
# ============================================================
duel:
  # Countdown before a duel round starts (seconds)
  countdown-seconds: 5
  # Time after a round ends before the next round / teleport back (seconds)
  round-end-delay: 3
  # Maximum duel duration per round in seconds (0 = unlimited)
  round-time-limit: 300
  # Whether to show a scoreboard during the duel
  show-scoreboard: true

