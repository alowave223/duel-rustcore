# ============================================================
# Kit Builder Mode Configuration
# ============================================================
# In this mode, players draft their own loadout from a menu
# of available items before each round.

mode:
  # Internal identifier (used for stats storage, commands, etc.)
  id: "kitbuilder"
  # Display name (MiniMessage format)
  display-name: "<gradient:#a855f7:#ec4899>Kit Builder</gradient>"
  description: "Build your own loadout and fight!"
  # Material for mode selection menu icon
  icon: NETHERITE_SWORD
  enabled: true

# ============================================================
# Round Settings
# ============================================================
rounds:
  # Available best-of options players can choose (or admins set)
  # The first value is the default
  available: [ 1, 3, 5 ]
  default: 1
  # If true, players re-draft their kit every round
  # If false, they keep whatever they drafted in round 1
  redraft-each-round: true

# ============================================================
# Default Equipment
# ============================================================
# These items are automatically equipped before the kit menu opens.
# They do NOT take up inventory space (armor goes to armor slots,
# offhand goes to offhand slot).
default-equipment:
  helmet:
    material: NETHERITE_HELMET
    enchantments:
      protection: 4
      unbreaking: 3
      mending: 1
  chestplate:
    material: NETHERITE_CHESTPLATE
    enchantments:
      protection: 4
      unbreaking: 3
      mending: 1
  leggings:
    material: NETHERITE_LEGGINGS
    enchantments:
      protection: 4
      unbreaking: 3
      mending: 1
  boots:
    material: NETHERITE_BOOTS
    enchantments:
      protection: 4
      unbreaking: 3
      mending: 1
      depth_strider: 3
  offhand:
    material: TOTEM_OF_UNDYING
    amount: 1

# ============================================================
# Kit Menu
# ============================================================
# Items available in the kit drafting menu.
# Players click items to add them to their inventory.
#
# Item ID syntax:
#   minecraft:<material_name>  - Vanilla items
#   executableitems:<item_id>  - ExecutableItems custom items
#
# Each item can have:
#   id         - Item identifier (see syntax above)
#   amount     - How many the player receives per click
#   slot       - Slot in the menu GUI (0-53 for double chest)
#   max        - Max times a player can pick this item (0 = unlimited)
#   name       - Custom display name (MiniMessage, optional)
#   lore       - Custom lore lines (MiniMessage, optional)
#   enchantments - Map of enchantment:level (optional, only for minecraft: items)
#   potion-type  - For potions: e.g. "strong_healing" (optional)
#   potion-meta  - For tipped arrows/potions: extended, upgraded, etc.
kit-menu:
  # Menu title (MiniMessage format)
  title: "<dark_purple><bold>Draft Your Kit"
  # Menu size in rows (1-6)
  rows: 6
  # Fill empty slots with this item (set to AIR to leave empty)
  filler:
    material: GRAY_STAINED_GLASS_PANE
    name: " "
  # Time limit for drafting in seconds (0 = unlimited, match starts when both ready)
  draft-time-limit: 30
  # Items available for drafting
  items:
    # === Weapons ===
    - id: "minecraft:netherite_sword"
      amount: 1
      slot: 10
      max: 1
      enchantments:
        sharpness: 5
        unbreaking: 3
        fire_aspect: 2
    - id: "minecraft:netherite_axe"
      amount: 1
      slot: 11
      max: 1
      enchantments:
        sharpness: 5
        unbreaking: 3
    - id: "minecraft:bow"
      amount: 1
      slot: 12
      max: 1
      enchantments:
        power: 5
        infinity: 1
        flame: 1
    - id: "minecraft:crossbow"
      amount: 1
      slot: 13
      max: 1
      enchantments:
        quick_charge: 3
        piercing: 4
    - id: "minecraft:trident"
      amount: 1
      slot: 14
      max: 1
      enchantments:
        loyalty: 3
        riptide: 0
        channeling: 1
    - id: "minecraft:mace"
      amount: 1
      slot: 15
      max: 1
      enchantments:
        density: 5
        unbreaking: 3

    # === Projectiles & Utilities ===
    - id: "minecraft:arrow"
      amount: 16
      slot: 19
      max: 4
    - id: "minecraft:ender_pearl"
      amount: 4
      slot: 20
      max: 2
    - id: "minecraft:snowball"
      amount: 16
      slot: 21
      max: 2
    - id: "minecraft:wind_charge"
      amount: 8
      slot: 22
      max: 3
    - id: "minecraft:fire_charge"
      amount: 8
      slot: 23
      max: 2
    - id: "minecraft:egg"
      amount: 16
      slot: 24
      max: 2

    # === Blocks & Building ===
    - id: "minecraft:obsidian"
      amount: 16
      slot: 28
      max: 4
    - id: "minecraft:cobblestone"
      amount: 64
      slot: 29
      max: 4
    - id: "minecraft:oak_planks"
      amount: 64
      slot: 30
      max: 4
    - id: "minecraft:cobweb"
      amount: 4
      slot: 31
      max: 3
    - id: "minecraft:water_bucket"
      amount: 1
      slot: 32
      max: 2
    - id: "minecraft:lava_bucket"
      amount: 1
      slot: 33
      max: 1
    - id: "minecraft:tnt"
      amount: 4
      slot: 34
      max: 3

    # === Consumables & Healing ===
    - id: "minecraft:golden_apple"
      amount: 4
      slot: 37
      max: 4
    - id: "minecraft:enchanted_golden_apple"
      amount: 1
      slot: 38
      max: 1
    - id: "minecraft:totem_of_undying"
      amount: 1
      slot: 39
      max: 3
      name: "<gold>Extra Totem"
      lore:
        - "<gray>Additional totem for your inventory"
    - id: "minecraft:splash_potion"
      amount: 1
      slot: 40
      max: 3
      potion-type: "strong_healing"
      name: "<red>Splash Healing II"
    - id: "minecraft:splash_potion"
      amount: 1
      slot: 41
      max: 2
      potion-type: "strong_swiftness"
      name: "<aqua>Splash Speed II"
    - id: "minecraft:splash_potion"
      amount: 1
      slot: 42
      max: 2
      potion-type: "strong_strength"
      name: "<dark_red>Splash Strength II"

    # === Special / Ready ===
    - id: "minecraft:shield"
      amount: 1
      slot: 16
      max: 1
      enchantments:
        unbreaking: 3

  # "Ready" button - click when done drafting
  ready-button:
    slot: 49
    material: LIME_DYE
    name: "<green><bold>READY"
    lore:
      - "<gray>Click when you're done drafting"
      - "<gray>your loadout!"

  # "Clear" button - reset your picks
  clear-button:
    slot: 48
    material: RED_DYE
    name: "<red><bold>CLEAR"
    lore:
      - "<gray>Reset your inventory and"
      - "<gray>start picking again"

  # Info item
  info-item:
    slot: 4
    material: BOOK
    name: "<yellow><bold>How It Works"
    lore:
      - "<gray>Click items to add them to"
      - "<gray>your inventory. You have a"
      - "<gray>limited number of picks per item."
      - " "
      - "<gray>Armor and offhand totem are"
      - "<gray>already equipped for you!"
      - " "
      - "<yellow>Click <green>READY <yellow>when done!"

# ============================================================
# Modifications
# ============================================================
# Toggle gameplay modifiers for this mode.
modifications:
  # If true, totems of undying will NOT activate on death
  disabled-totems: false
  # Knockback multiplier (1.0 = normal, 2.0 = double, 0.5 = half)
  knockback-multiplier: 1.0
  # Damage multiplier (1.0 = normal)
  damage-multiplier: 1.0
  # If true, natural regeneration is disabled (must use potions/gapples)
  no-natural-regen: true
  # If true, hunger is disabled (food bar stays full)
  no-hunger: true
  # If true, players cannot use elytra
  no-elytra: false
  # Keep inventory on death within the duel (items don't drop)
  keep-inventory: true
  # Disable fire tick damage
  no-fire-tick: false

# ============================================================
# Win Condition
# ============================================================
win-condition:
  # Type: "last_alive" (opponent dies), "points" (first to X kills in a round)
  type: "last_alive"
  # Only used if type is "points"
  points-to-win: 1

# ============================================================
# Stats tracked for this mode
# ============================================================
stats:
  # File where stats are stored (relative to plugin data folder)
  file: "stats/kitbuilder_stats.yml"
  tracked:
    - wins
    - losses
    - kills
    - deaths
    - win_streak
    - best_win_streak
    - elo
  # Starting ELO for new players
  starting-elo: 1000
  # ELO K-factor
  elo-k-factor: 32
