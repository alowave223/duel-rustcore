services:
  rating:
    build: .
    container_name: rating-service
    restart: unless-stopped
    env_file: .env
    network_mode: host
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; host = os.environ.get('RATING_BIND_HOST', '127.0.0.1'); port = os.environ.get('RATING_BIND_PORT', '8088'); urllib.request.urlopen('http://%s:%s/healthz' % (host, port), timeout=2).read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
